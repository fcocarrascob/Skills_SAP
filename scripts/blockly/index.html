<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SAP2000 Visual Scripter — Blockly</title>
    
    <!-- Blockly CSS -->
    <link rel="stylesheet" href="https://unpkg.com/blockly/blockly_compressed.css">
    
    <!-- Blockly JS -->
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/en.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed.js"></script>
    
    <!-- Qt WebChannel (para comunicación PySide6) -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: #f5f5f5;
        }
        
        #blockly-workspace {
            width: 100%;
            height: 100%;
        }
        
        .blockly-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
<div class="blockly-container">
    <div id="blockly-workspace"></div>
</div>

<!-- Definiciones de bloques (inyectadas por Python) -->
<script id="block-definitions"></script>

<!-- Workspace JavaScript -->
<script>
let workspace = null;
let bridge = null;
let pythonGenerator = null;

// Esperar a que se cargue la página
window.addEventListener('load', () => {
    // Conectar con Qt WebChannel
    if (typeof qt !== 'undefined' && qt.webChannelTransport) {
        new QWebChannel(qt.webChannelTransport, (channel) => {
            bridge = channel.objects.bridge;
            console.log("WebChannel conectado");
            initBlockly();
        });
    } else {
        console.warn("Qt WebChannel no disponible (probable: navegador/testing)");
        // Para testing sin Qt
        initBlockly();
    }
});

function initBlockly() {
    console.log("Inicializando Blockly...");
    
    // Toolbox XML (será inyectado)
    const toolboxXml = document.getElementById('toolbox-xml') || createDefaultToolbox();
    
    // Inyectar Blockly
    workspace = Blockly.inject('blockly-workspace', {
        toolbox: toolboxXml,
        grid: {
            spacing: 20,
            length: 3,
            colour: '#ccc',
            snap: true
        },
        trashcan: true,
        maxTrashcanContents: 64,
        move: {
            scrollbars: {
                horizontal: true,
                vertical: true
            },
            drag: true,
            wheel: true
        },
        zoom: {
            controls: true,
            wheel: true,
            startScale: 1.0,
            maxScale: 3,
            minScale: 0.3,
            scaleSpeed: 1.2
        }
    });
    
    // Listeners
    workspace.addChangeListener(onWorkspaceChange);
    console.log("Blockly inicializado");
}

function createDefaultToolbox() {
    // Toolbox de ejemplo mientras se carga el real
    return `
        <xml id="toolbox" style="display: none">
            <category name="Inicializar (1)" colour="0">
                <block type="sap_File_NewBlank"></block>
            </category>
            <category name="Materiales (2)" colour="45">
                <block type="sap_PropMaterial_SetMaterial"></block>
            </category>
            <category name="Secciones (3)" colour="90">
                <block type="sap_PropFrame_SetRectangle"></block>
            </category>
        </xml>
    `;
}

function onWorkspaceChange(event) {
    // Notificar a Python que el workspace cambió
    const xml = Blockly.Xml.workspaceToDom(workspace);
    const xmlStr = new XMLSerializer().serializeToString(xml);
    
    if (bridge && bridge.on_workspace_update) {
        bridge.on_workspace_update(xmlStr);
    }
    
    console.log("Workspace actualizado");
}

function getWorkspaceXml() {
    if (!workspace) return null;
    const xml = Blockly.Xml.workspaceToDom(workspace);
    return new XMLSerializer().serializeToString(xml);
}

function generatePython() {
    if (!workspace) return "";
    const pythonCode = Blockly.Python.workspaceToCode(workspace);
    return pythonCode;
}

function clearWorkspace() {
    if (workspace) {
        workspace.clear();
    }
}

// Funciones globales para PySide6 (pyqtSlot puede invocar)
window.pyQtGetWorkspaceXml = getWorkspaceXml;
window.pyQtGeneratePython = generatePython;
window.pyQtClearWorkspace = clearWorkspace;
window.pyQtLoadXml = function(xmlStr) {
    if (workspace && xmlStr) {
        const xml = new DOMParser().parseFromString(xmlStr, 'text/xml');
        Blockly.Xml.domToWorkspace(xml.documentElement, workspace);
    }
};
</script>

</body>
</html>
